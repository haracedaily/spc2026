    <title>Document</title>
    <style>
                .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: #000;
            color: #fff;
            font-size: 2em;

            display: flex;
            justify-content: center;
            align-items: center;

            z-index: 1000;

            animation: fadeOut 1s ease-in-out 3s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .content {
            opacity: 0;
            animation: fadeIn 1s ease-in-out 4s forwards;
            padding: 20px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
