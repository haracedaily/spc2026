<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <style>
      .my_bg_yellow {
        background-color: yellow;
        border: 1px dashed red;
      }
      .my_txt_red {
        color: red;
        border: 1px dotted blue;
      }
      .my_txt_blue {
        color: blue;
        border: 1px double green;
      }
      .my_txt_pink {
        color: pink;
        border: 1px groove purple;
      }
      p {
        color: green;
        border: 1px dotted orange;
      }
      #my_bg_orange {
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <h1>CSS 연습</h1>
    <p class="my_bg_yellow">여기는 아무 문장이나 적으세요.</p>
    <p>여기는 아무 문장이나 적으세요.</p>
    <p class="my_txt_blue my_bg_yellow" id="my_bg_orange">여기는 아무 문장이나 적으세요.</p>
    <p class="my_txt_blue my_txt_pink">여기는 아무 문장이나 적으세요.</p>
  </body>
</html>
