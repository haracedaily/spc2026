<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        perspective: 1200px; /* 부모에 줘야 함 */
      }

      .box {
        width: 100px;
        height: 100px;
        background-color: red;

        animation-name: move-left;
        animation-duration: 4s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
        &:hover {
          animation-play-state: paused;
          cursor:pointer
        }
      }
      .container:hover .box {
        animation-play-state: paused;
      }
      .text {
        color: black;
        animation-name: fadeOut;
        animation-duration: 1.5s;
        animation-iteration-count: 3;
        animation-timing-function: linear;
        animation-delay: 2s;
      }

      @keyframes move-left {
        0% {
          transform: translate3d(0, 0, 0) rotateY(0deg);
        }

        25% {
          transform: translate3d(50vw, -50px, 0) rotateX(90deg) rotateY(40deg);
        }

        50% {
          transform: translate3d(90vw, 0, 0) rotateX(180deg);
        }
        75% {
          transform: translate3d(50vw, 50px, 0) rotateX(270deg) rotateY(-40deg);
        }
        100% {
          transform: translate3d(0, 0, 0) rotateX(360deg);
        }
      }

      @keyframes fadeOut {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      .circle {
        width: 100px;
        height: 100px;
        background-color: blue;
        border-radius: 40px;
        animation-name: rotateAndScale;
        animation-duration: 2s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
        z-index: 1;
        position:relative
      }

      @keyframes rotateAndScale {
        0% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(1.5);
        }
        100% {
          transform: rotate(360deg) scale(1);
        }
      }
      .image {
        animation-name: shake;
        animation-duration: 0.5s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
      }
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px) rotate(-5deg);
        }
        50% {
          transform: translateX(100px) rotate(5deg);
        }
        75% {
          transform: translateX(-10px) rotate(-5deg);
        }
        100% {
          transform: translateX(0) rotate(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box"></div>
    </div>
    <p class="text">Hello, World!</p>
    <hr />
    <div class="circle"></div>
    <img src="images/cat1.jpg" class="image" alt="">
  </body>
</html>
