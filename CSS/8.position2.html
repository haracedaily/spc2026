<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bg{
            height:300px;
            background-color: orange;
        }
        .center{
            background-color:orangered;
        }
        .fixed{
            width:100px;
            height:100px;
            background-color: teal;
            background-image:url(images/starbucks.svg);
            background-size:100% 100%;
            position:fixed;
            right:50px;
            bottom:50px;
            transition: transform 0.3s;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="bg center"></div>
    <div class="bg"></div>
    <div class="fixed"></div>
    <script>
        const elem = document.querySelector('.fixed');
        elem.addEventListener('click',()=>{
            elem.style.transform = elem.style.transform === 'scale(0.2)' ? 'scale(1)' : 'scale(0.2)';
        });
    </script>
</body>
</html>
