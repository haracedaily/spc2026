<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul{
            list-style-type: none;
            margin:0;
            padding:0;
            display:flex;
            border: 1px solid #555;
        }
        li{
            flex:1; /* flex영역을 꽉채우기 */
            width:100px;
            text-align:center;
        }
        a{
            display:block;
            text-decoration:none;
            &:hover{
                color:white;
                background-color: #555;
            }
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">News</a></li>
        <li><a href="#">Content</a></li>
        <li><a href="#">About</a></li>
    </ul>
    
</body>
</html>
