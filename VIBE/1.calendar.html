<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2025~2027 여행 달력</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day {
      height: 80px;
      border: 1px solid #eee;
      padding: 5px;
      font-size: 0.9rem;
    }

    .holiday {
      color: red;
      font-weight: bold;
    }

    .sunday {
      color: red;
    }

    .saturday {
      color: blue;
    }

    .month-card img {
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .month-title {
      font-weight: bold;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h2 class="text-center mb-4">📅 2025 ~ 2027 여행 달력</h2>
  <div class="accordion" id="calendarAccordion"></div>
</div>

<script>
// 공휴일 (샘플)
const holidays = {
  "2025-01-01": "신정",
  "2025-03-01": "삼일절",
  "2025-05-05": "어린이날",
  "2025-06-06": "현충일",
  "2025-08-15": "광복절",
  "2025-10-03": "개천절",
  "2025-12-25": "성탄절",

  "2026-01-01": "신정",
  "2026-03-01": "삼일절",
  "2026-05-05": "어린이날",

  "2027-01-01": "신정",
  "2027-03-01": "삼일절"
};

// 안정적인 이미지
const monthImages = [
  "https://picsum.photos/seed/jan/800/400",
  "https://picsum.photos/seed/feb/800/400",
  "https://picsum.photos/seed/mar/800/400",
  "https://picsum.photos/seed/apr/800/400",
  "https://picsum.photos/seed/may/800/400",
  "https://picsum.photos/seed/jun/800/400",
  "https://picsum.photos/seed/jul/800/400",
  "https://picsum.photos/seed/aug/800/400",
  "https://picsum.photos/seed/sep/800/400",
  "https://picsum.photos/seed/oct/800/400",
  "https://picsum.photos/seed/nov/800/400",
  "https://picsum.photos/seed/dec/800/400"
];

// 여행 사이트 이동
function goTravel(year, month) {
  const url = `https://korean.visitkorea.or.kr/search/search_list.do?keyword=${year}년 ${month}월 여행`;
  window.open(url, "_blank");
}

// 달력 생성
function generateCalendar(year) {
  let html = "";

  for (let month = 1; month <= 12; month++) {
    const firstDay = new Date(year, month - 1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();

    html += `
      <div class="col-md-6 col-lg-4 mb-4">
        <div class="card month-card shadow-sm">
          <img src="${monthImages[month-1]}" class="card-img-top">

          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="month-title">${month}월</span>
              <button class="btn btn-sm btn-primary" onclick="goTravel(${year}, ${month})">
                여행 보기
              </button>
            </div>

            <!-- 요일 -->
            <div class="calendar-grid text-center fw-bold">
              <div class="sunday">일</div>
              <div>월</div>
              <div>화</div>
              <div>수</div>
              <div>목</div>
              <div>금</div>
              <div class="saturday">토</div>
            </div>

            <!-- 날짜 -->
            <div class="calendar-grid">
    `;

    let day = 1;

    for (let i = 0; i < 6; i++) {
      for (let j = 0; j < 7; j++) {
        if ((i === 0 && j < firstDay) || day > lastDate) {
          html += `<div class="calendar-day"></div>`;
        } else {
          const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isHoliday = holidays[dateStr];

          let className = "calendar-day";
          if (j === 0) className += " sunday";
          if (j === 6) className += " saturday";
          if (isHoliday) className += " holiday";

          html += `
            <div class="${className}">
              ${day}
              ${isHoliday ? `<div style="font-size:0.7rem">${isHoliday}</div>` : ""}
            </div>
          `;
          day++;
        }
      }
    }

    html += `
            </div>
          </div>
        </div>
      </div>
    `;
  }

  return `<div class="row">${html}</div>`;
}

// 아코디언 생성
const years = [2025, 2026, 2027];
const accordion = document.getElementById("calendarAccordion");

years.forEach((year, index) => {
  accordion.innerHTML += `
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button ${index !== 0 ? 'collapsed' : ''}" 
          data-bs-toggle="collapse" 
          data-bs-target="#year${year}">
          ${year}년
        </button>
      </h2>

      <div id="year${year}" class="accordion-collapse collapse ${index === 0 ? 'show' : ''}">
        <div class="accordion-body">
          ${generateCalendar(year)}
        </div>
      </div>
    </div>
  `;
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
