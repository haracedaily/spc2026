<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #dragItem {
            width: 100px;
            height: 100px;
            background-color: #ffcc00;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1;
        }

        .dropContainer {
            width: 200px;
            height: 200px;
            background-color: #f0f0f0;
            border: 2px dashed #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }

        .placeholder {
            position: absolute;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="startZone" class="dropContainer">
        <span class="placeholder" id="startPlaceholder">drop Here</span>
        <div id="dragItem" draggable="true">dragMe</div>
    </div>

    <div id="dropZone" class="dropContainer">
        <span class="placeholder" id="dropPlaceholder">Drop Here</span>
    </div>

    <script>
        const dragItem = document.getElementById("dragItem");
        const dropZone = document.getElementById("dropZone");
        const startZone = document.getElementById("startZone");

        dragItem.addEventListener("dragstart",()=>{
            console.log("Drag Start");
        });

        [startZone,dropZone].forEach((ele)=>{
                    ele.addEventListener("dragover",(ev)=>{
                        ev.preventDefault();
                    console.log(ele.id+" 위에 있음")});
        });


        [startZone,dropZone].forEach((ele)=>{
                    ele.addEventListener("drop",()=>{
            ele.appendChild(dragItem);
            console.log("여기에 놓음");
        })
        });
        
    </script>
</body>
</html>
