<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="myInput" placeholder="키를 입력하세요">
    <script>
        document.getElementById("myInput").addEventListener("keydown",(ev)=>{
            console.log("키가 입력됨 : "+ ev.key)
            console.log(ev);
        })
    </script>
</body>
</html>
