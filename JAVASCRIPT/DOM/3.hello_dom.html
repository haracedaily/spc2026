<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    </style>
</head>
<body>
    <h1>나의 헤딩</h1>
    <p>여기는 나의 문장이 있는 곳</p>
    <div id="output" data-text="동적으로 컨텐츠를 채울 곳">동적으로 컨텐츠를 채울 곳</div>
    <p>여기는 나의 두번째 문장이 있는 것</p>
    <button onclick="sayHello()">여기는 나의 버튼</button>
    <script>
        function sayHello(){
            console.log('sayhello');
            const myplace = document.querySelector('div');
            console.log(myplace);
            const myoutput = document.getElementById('output');
            console.log(myoutput);
            myoutput.classList.toggle("text");
            if(myoutput.classList[0])
            myoutput.textContent="나의 새로운 동적 문장";
            else
            myoutput.textContent=myoutput.dataset.text;
        }
    </script>
</body>
</html>
