<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #mydiv {
        width: 200px;
        height: 200px;
        background-color: lightsalmon;
      }
      .none{
        display:none;
      }
    </style>
  </head>
  <body>
    <h1>Show/Hide</h1>
    <button onclick="showhide()">숨겨진 요소 토글</button>
    <div id="mydiv" class="none">이것은 숨겨진 Div요소입니다.</div>
    <dialog id="mydia">
      이것은 숨겨진 dialog입니다.
      <form method="dialog">
        <div class="btn-group">
            <button value="confirm">check</button>
            <button value="cancel">cancel</button>
            <button value="delete">delete</button>
        </div>
      </form>
    </dialog>
    <script>
      function showhide() {
        const div = document.querySelector("#mydiv");
        const dialog = document.querySelector("#mydia");
        // dialog.showModal();
        div.style.display=="block"?div.style.display="none":div.style.display="block";
        // DOM입장에선 style에 들어간 none을 인식 못함
        // div.style.display="block";
        // div.classList.toggle("none");
      }

      function showhide_withBug(){
        const div = document.querySelector("#mydiv");
        // DOM요소에서 CSS를 인식 못하고 인라인에 있는 것만 가져옴
        // style에 선언된 css를 가져오지 못해서 문제 발생
        if(div.style.display == 'none'){
            div.style.display="block;"
        }else{
            div.style.display="none";
        }
      }

      function showhide_bugFix1(){
        // 실제 style까지 적용된 결과로 연산한다.
        const div = document.querySelector("#mydiv");
        const displayStyle = window.getComputedStyle(div).display;
        // 연산된 결과물 가져옴(css가 적용된 현재값);
        if(displayStyle=="none"){
            div.style.display="block";
        }else{
            div.style.display="none";
        }
      }
    </script>
  </body>
</html>
