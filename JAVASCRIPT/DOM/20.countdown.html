<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #countDiv {
        width: 150px;
        padding: 20px;
        margin: 10px;
      }
      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <h1>카운트다운</h1>
    <input
      type="number"
      name=""
      id="timeInput"
      placeholder="초를 입력해주세요"
      min="1"
    />
    <button onclick="startTimer()" id="startBtn">시작</button>
    <div id="countDiv">
      <p id="timerDisplay">
        <!-- 카운트다운을 출력할 곳 -->
      </p>
    </div>
    <script>
      const timeIpt = document.getElementById("timeInput");
      const timer = document.getElementById("timerDisplay");
      const cntDiv = document.getElementById("countDiv");
      const sBtn = document.getElementById("startBtn");
      let timeInterval;

      function startTimer() {
        sTime = parseInt(timeIpt.value);
        if (!sTime) {
          timer.textContnent = "시간을 입력해주세요";
          return;
        }
        sBtn.disabled = true;
        let random = () => parseInt(Math.random() * 256);
        let R = random().toString(16).padStart(2, "0");
        let G = random().toString(16).padStart(2, "0");
        let B = random().toString(16).padStart(2, "0");
        cntDiv.style.border = "1px solid #" + R + G + B;

        R = random().toString(16).padStart(2, "0");
        G = random().toString(16).padStart(2, "0");
        B = random().toString(16).padStart(2, "0");
        timer.style.border = "1px solid #" + R + G + B;
        timer.textContent = sTime + "s !";
        // Interval Start
        timeInterval = setInterval(() => {
          R = random().toString(16).padStart(2, "0");
          G = random().toString(16).padStart(2, "0");
          B = random().toString(16).padStart(2, "0");
          cntDiv.style.border = "1px solid #" + R + G + B;

          R = random().toString(16).padStart(2, "0");
          G = random().toString(16).padStart(2, "0");
          B = random().toString(16).padStart(2, "0");
          timer.style.border = "1px solid #" + R + G + B;

          sTime--;
          timer.textContent = sTime + "s !";
          console.log(sTime);
          if (!sTime) {
            timer.textContent = "🎆Boomb !";
            sBtn.disabled = false;
            clearInterval(timeInterval);
          }
        }, 1000);
      }
    </script>
  </body>
</html>
