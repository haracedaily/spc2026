<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        flex: 1;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 40px);
        background-color:  #1e293b;
        color:white;    
      }
      .stopwatch-box {
        width: 50%;
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        background-color:#24304A;
        border-radius: 1.5em;
        padding:1em;
        border:1px solid black;
        box-shadow: 2px 4px 2px black;
      }
      #stopwatch {
        font-size: 2em;
        border-bottom:1px solid white;
      }
      button {
        font-size: 1.5em;
        padding: 0.4em;
        border-radius: 0.2em;
      }
      .none {
        display: none;
      }
      #laptimer{
        min-width:200px;
        height:8.5em;
        overflow-y:scroll;
        font-size:1.2em;
        padding:0.5em;
        scrollbar-width:none;
        &:hover{
            scrollbar-width: thin;
        }
      }
      #startBtn{
        background-color:#8da7df;
      }
      #resetBtn,#lapBtn{
        background-color: #777;
      }
      #stopBtn{
        background-color:#d43a42;
      }
      #button-container{
        perspective:700px;
      }
      button{
        margin:0.5em;
      }
      button:hover{
        transform:scale3d(1.2,1.2,2);
      }
      button:disabled:hover{
        transform:scale3d(0.8,0.8,0.5);
      }
      h3{
        border-bottom:1px solid white;
      }
      .lap-flex{
        display:flex;
        align-items: center;
        justify-content: space-around;
        min-width:200px;
      }
    </style>
  </head>
  <body>
    <div class="stopwatch-box">
      <div class="stopwatch-div">
        <p id="stopwatch">00:00.00</p>
      </div>
      <div class="button-container">
        <div id="btn-group-s">
          <button id="resetBtn" disabled>Reset</button>
          <button id="startBtn" class="red">Start</button>
        </div>
        <div id="btn-group-r" class="none">
          <button id="lapBtn">lap</button>
          <button id="stopBtn">Stop</button>
        </div>
      </div>
      <h3>lapTimer</h3>
      <div class="lap-flex">
        <div>회차</div>
        <div>시간</div>
      </div>
      <div id="laptimer">
      </div>
    </div>
    <script>
      // 시작시간, 경과시간, sync값
      let startTime;
      let pastTime = 0;
      let syncTime = 0;
      let running = false;
      const stopWatch = document.getElementById("stopwatch");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const resetBtn = document.getElementById("resetBtn");
      const lapBtn = document.getElementById('lapBtn');
      const startGroup = document.getElementById("btn-group-s");
      const runningGroup = document.getElementById("btn-group-r");
      const laptimer = document.getElementById("laptimer");
      let timerId;
      let lapCnt = 0;

      //   jiffies 리눅스/유닉스에서 사용되었던 시간을 나타내는 단위
      function startTimer() {
        // startTime = newDate().getTime();
        startTime = Math.round(performance.now()) - pastTime;
        timerId = setInterval(updateTimer, 10);
      }

      function updateTimer() {
        pastTime = performance.now()-startTime;

        let min = Math.floor(pastTime%(1000*60*60)/(1000*60))+"";
        let sec = Math.floor(pastTime%(1000*60)/(1000))+"";
        let ms = Math.floor(pastTime%(1000)/(10))+"";
        stopWatch.textContent=`${min.padStart(2,"0")}:${sec.padStart(2,"0")}.${ms.padStart(2,"0")}`;
      }

      startBtn.addEventListener("click", () => {
        running = true;
        startGroup.classList.add("none");
        runningGroup.classList.remove("none");
        startTimer();
      });

      stopBtn.addEventListener("click", () => {
        running = false;
        runningGroup.classList.add("none");
        startGroup.classList.remove("none");
        if(pastTime)resetBtn.disabled=false;
        clearInterval(timerId);
      });

      lapBtn.addEventListener('click',()=>{
        lapCnt++;
        pastTime = performance.now()-startTime;

        let min = Math.floor(pastTime%(1000*60*60)/(1000*60))+"";
        let sec = Math.floor(pastTime%(1000*60)/(1000))+"";
        let ms = Math.floor(pastTime%(1000)/(10))+"";

        let div = document.createElement("div");
        div.classList="lap-flex";
        let lapSpan = document.createElement("span");
        lapSpan.textContent = `${lapCnt}`;
        let timeSpan = document.createElement("span");
        timeSpan.textContent=`${min.padStart(2,"0")}:${sec.padStart(2,"0")}.${ms.padStart(2,"0")}`;
        div.append(lapSpan);
        div.append(timeSpan);
        laptimer.prepend(div)
      })

      resetBtn.addEventListener('click',()=>{
        lapCnt = 0;
        startTime="";
        pastTime=0;
        stopWatch.textContent=`00:00.00`;
        laptimer.innerHTML="";
        resetBtn.disabled=true;
      })

    </script>
  </body>
</html>
