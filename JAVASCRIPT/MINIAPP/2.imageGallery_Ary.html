<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>이미지 갤러리</h1>
    <div class="gallery" id="gallery">
        <img src="./images/cat1.jpg" alt="" width="100px" id="img1">
        <img src="./images/cat2.jpg" alt="" width="100px" id="img2">
        <img src="./images/cat3.jpg" alt="" width="100px" id="img3">
        <!-- hover + click -->
    </div>
    <!-- 방법 1 ( 클릭했을때 아래에 이미지 크기 키워서 소스 들어가게 하기 ) -->
     <img id="large-image" src="" alt="">
     <script>
        document.getElementById('gallery').childNodes.forEach((node)=>node.addEventListener('click',()=>{
                const large = document.getElementById('large-image');
                large.src = node.src;
                large.width = "400";
            })
        );
     </script>
</body>
</html>
