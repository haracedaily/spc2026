<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>사용자 목록</h1>
    <ul>
        <form action="" onsubmit="event.preventDefault(); location.href='/user/'+document.getElementById('userId').value">
            <input type="text" name="id" id="userId">
            <button type="submit">검색</button>

        </form>

        <!-- {% if user_id %}
         {% set u = users.get(user_id) %}
         <ul>
            <li>ID : {{u.id}}, 이름 : {{u.name}}, 이메일 {{u.email}}</li>
         </ul>

        {% else %}
         <ul>
            <li>사용자를 찾을 수 없습니다.</li>
         </ul>
        {% endif %} -->


        {% for key,user in users.items() %}
        <a href="/user/{{user.id}}">
            <li>사용자 아이디 : {{user["id"]}}</li>
        </a>
        <li>사용자 이름 : {{user["name"]}}</li>
        <li>사용자 이메일 : {{user["email"]}}</li>
        {% endfor %}
    </ul>
</body>
</html>
