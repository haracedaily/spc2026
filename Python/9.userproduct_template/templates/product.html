<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <h1>상품 목록</h1>
        <form action="/product" method="get">
            <label for="id">상품검색</label>
        <input type="text" name="id" placeholder="상품 아이디 검색" value="{{request.args.get('id','')}}">
        <input type="text" name="name" placeholder="상품 이름 검색" value="{{request.args.get('name','')}}">
        <button type="submit">검색</button>
    </form>
    <ul>
        {% if products %}
        {% for key,product in products.items() %}
        <li>상품 코드 : {{product["id"]}}</li>
        <li>상품 이름 : {{product["name"]}}</li>
        <li>상품 가격 : {{product["price"]}}</li>
        {% endfor %}
        {% else %}
        <li>조건에 맞는 상품이 없습니다.</li>
        {% endif %}
    </ul>
</body>
</html>
