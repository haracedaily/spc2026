<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>상품 목록</h1>
    <table>
        <thead>
            <th>상품명</th>
            <th>가격</th>
            <th>담기</th>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
            <td>{{item.name}}</td>
            <td>{{item.price}}원</td>
            <td><a href="{{ url_for('add',item_id=item.id)}}">담기</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% if message %}
    <p style="color:green">{{message}}</p>
    {% endif %}
    <a href="/cart">장바구니 가기</a>
</body>
</html>
