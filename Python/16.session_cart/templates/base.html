<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0
        }
        ul{
            margin:0;
            display:flex;
            list-style:none;
        }
        li{
            margin-right:1rem;
            width:100px;
            padding:5px;
        }
        a[data-active="true"] {
            font-weight:900;
        }
        nav{
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>Navbar</li>
                <li><a href="/" data-active="true">Home</a></li>
                <li><a href="/login">Login</a></li>
                <li><a href="/product">Product</a></li>
                <li><a href="/carts">Cart</a></li>
            </ul>
        </nav>
    </header>
    
    {% block content %}
    {% endblock %}
</body>
</html>
