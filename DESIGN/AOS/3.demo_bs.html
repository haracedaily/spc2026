<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap + AOS Demo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <style>
    body { height: 4000px; background-color: #111; color: white; }
    .section { padding: 120px 0; }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="vh-100 d-flex flex-column justify-content-center align-items-center text-center">
    <h1 class="display-3 fw-bold mb-4" data-aos="fade-down">Bootstrap + AOS Demo</h1>
    <p class="text-secondary" data-aos="fade-up" data-aos-delay="200">스크롤을 내려 다양한 효과 확인</p>
  </section>

  <!-- FADE SECTION -->
  <section class="section container">

    <div class="p-5 bg-dark rounded mb-5" data-aos="fade-right">
      <h2>Fade Right</h2>
      <p>오른쪽에서 등장</p>
    </div>

    <div class="p-5 bg-dark rounded mb-5" data-aos="fade-left">
      <h2>Fade Left</h2>
      <p>왼쪽에서 등장</p>
    </div>

    <div class="p-5 bg-dark rounded mb-5" data-aos="fade-up">
      <h2>Fade Up</h2>
      <p>아래 → 위</p>
    </div>

    <div class="p-5 bg-dark rounded" data-aos="fade-down">
      <h2>Fade Down</h2>
      <p>위 → 아래</p>
    </div>

  </section>

  <!-- ZOOM SECTION -->
  <section class="section bg-dark">
    <div class="container">
      <div class="row g-4">

        <div class="col-md-4">
          <div class="p-4 bg-secondary rounded text-center" data-aos="zoom-in">Zoom In</div>
        </div>

        <div class="col-md-4">
          <div class="p-4 bg-secondary rounded text-center" data-aos="zoom-in-up">Zoom In Up</div>
        </div>

        <div class="col-md-4">
          <div class="p-4 bg-secondary rounded text-center" data-aos="zoom-in-down">Zoom In Down</div>
        </div>

      </div>
    </div>
  </section>

  <!-- FLIP SECTION -->
  <section class="section container">
    <div class="row g-4 text-center">

      <div class="col-md-4">
        <div class="p-5 bg-primary rounded" data-aos="flip-left">Flip Left</div>
      </div>

      <div class="col-md-4">
        <div class="p-5 bg-danger rounded" data-aos="flip-right">Flip Right</div>
      </div>

      <div class="col-md-4">
        <div class="p-5 bg-success rounded" data-aos="flip-up">Flip Up</div>
      </div>

    </div>
  </section>

  <!-- STAGGER -->
  <section class="section bg-dark">
    <div class="container text-center">
      <h2 class="mb-5" data-aos="fade-up">Stagger Animation</h2>

      <div class="row g-3">
        <div class="col-12">
          <div class="p-3 bg-secondary rounded" data-aos="fade-right" data-aos-delay="100">Item 1</div>
        </div>
        <div class="col-12">
          <div class="p-3 bg-secondary rounded" data-aos="fade-right" data-aos-delay="200">Item 2</div>
        </div>
        <div class="col-12">
          <div class="p-3 bg-secondary rounded" data-aos="fade-right" data-aos-delay="300">Item 3</div>
        </div>
        <div class="col-12">
          <div class="p-3 bg-secondary rounded" data-aos="fade-right" data-aos-delay="400">Item 4</div>
        </div>
      </div>

    </div>
  </section>

  <!-- PARALLAX -->
  <section class="vh-100 d-flex align-items-center justify-content-center text-center" 
    style="background-image:url('https://picsum.photos/1920/1080'); background-attachment: fixed; background-size: cover;">
    <h2 class="display-4 fw-bold" data-aos="zoom-in">Parallax 느낌</h2>
  </section>

  <!-- FINAL -->
  <section class="section text-center">
    <h2 data-aos="fade-up">끝!</h2>
    <p class="text-secondary" data-aos="fade-up" data-aos-delay="200">확장 가능</p>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 1000,
      once: false
    });
  </script>

</body>
</html>
