<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body{
            height:2000px;
            /* 강제 스크롤을 위한 공간확보 */
            padding:50px;

        }
        .box{
            margin: 100px 0;
            padding:40px;
            background-color:#ffc7c7;
            border:1px solid #ff7373;
            text-align:center;
            font-size:24px;
            height:400px;
        }
    </style>
</head>
<body>
    <h1>스크롤 하면서 등장하는 요소들</h1>
    <div class="box" data-aos="zoom-out">첫번째 박스</div>
    <div class="box">2번째 박스</div>
    <div class="box" data-aos="fade-up">첫번째 박스</div>
    <div class="box" data-aos="fade-right">2번째 박스</div>
    <div class="box" data-aos="zoom-in">3번째 박스</div>
      <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
